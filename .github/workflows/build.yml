name: DollBody Firmware CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.2

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build ESP-IDF Project
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py build

      - name: Merge firmware binaries
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          esptool.py --chip esp32s3 merge_bin \
            -o build/merged.bin \
            --flash_mode keep \
            --flash_freq 80m \
            --flash_size 32MB \
            0x0000 build/bootloader/bootloader.bin \
            0x8000 build/partition_table/partition-table.bin \
            0x10000 build/dollbody.bin

      - name: Fix git ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Get Commit Hash
        run: echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Create Git Tag
        run: |
          git tag "$COMMIT_HASH"
          git push origin "$COMMIT_HASH"
        env:
          COMMIT_HASH: ${{ env.COMMIT_HASH }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.COMMIT_HASH }}
          body: |
            **DollBody firmware release from commit `${{ env.COMMIT_HASH }}`**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Firmware to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.COMMIT_HASH }}
          files: |
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/dollbody.bin
            build/merged.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Firmware to CipherDolls API
        if: success()
        run: |
          curl -f -X POST \
            -H "Authorization: Bearer ${{ secrets.CIPHERDOLLS_API_KEY }}" \
            -F "bootloader=@build/bootloader/bootloader.bin" \
            -F "partitions=@build/partition_table/partition-table.bin" \
            -F "firmware=@build/dollbody.bin" \
            -F "merged=@build/merged.bin" \
            -F "version=${{ env.COMMIT_HASH }}" \
            -F "dollBodyId=${{ secrets.CIPHERDOLLS_DOLL_BODY_ID }}" \
            https://api.cipherdolls.com/firmwares
